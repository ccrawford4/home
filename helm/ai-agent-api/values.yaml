application-template:
  name: ai-agent-api
  namespace: ai-agent-api
  clusterSecretStoreName: cluster-secret-store
  serviceAccount:
    create: true
    name: ai-agent-api
    clusterRole:
      name: ai-agent-api
      rules:
        - apiGroups: [""]
          resources: ["pods", "namespaces", "nodes"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["metrics.k8s.io"]
          resources: ["pods", "nodes"]
          verbs: ["get", "list", "watch"]
    clusterRoleBinding:
      name: ai-agent-api
  deployments:
    - name: ai-agent-api
      image:
        repository: ccrawford4/ai-agent-api
        pullPolicy: IfNotPresent
        tag: "v1.1.0"
        port: 8080
      service:
        enabled: true
        port: 80
        targetPort: 8080
      replicaCount: 3
      container:
        env:
          - name: CHAT_API_KEY
            valueFrom:
              secretKeyRef:
                name: ai-agent-api-secrets
                key: chat-api-key
          - name: KUBE_API_SERVER
            valueFrom:
              secretKeyRef:
                name: ai-agent-api-secrets
                key: kube-api-server
          - name: OPENAI_API_KEY
            valueFrom:
              secretKeyRef:
                name: ai-agent-api-secrets
                key: openai-api-key
          - name: PRODUCTION_MODE
            value: "true"
          - name: REDIS_HOST
            value: "ai-agent-api-redis"
          - name: REDIS_PORT
            value: "6379"
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ai-agent-api-secrets
                key: redis-password
  secrets:
    - name: ai-agent-api-secrets
      data:
        - secretKey: chat-api-key
          remoteRefKey: ai-agent-api-chat-api-key
        - secretKey: kube-api-server
          remoteRefKey: ai-agent-api-kube-api-server
        - secretKey: openai-api-key
          remoteRefKey: ai-agent-api-openai-api-key
        - secretKey: redis-password
          remoteRefKey: ai-agent-api-redis-password
redis:
  name: ai-agent-api-redis
  namespace: ai-agent-api
  clusterSecretStoreName: cluster-secret-store
  image:
    repository: redis
    tag: "7.0"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 1Gi
  secrets:
    useExternalSecrets: true
    externalSecrets:
      passwordKey: ai-agent-api-redis-password
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
