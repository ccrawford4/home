application-template:
  namespace: search-app
  clusterSecretStoreName: cluster-secret-store

  deployments:
    frontend:
      name: search-app-frontend
      replicaCount: 1
      image:
        repository: ccrawford4/search-app-frontend
        pullPolicy: IfNotPresent
        tag: "latest"
        port: 3000
      service:
        type: ClusterIP
        port: 80
      livenessProbe:
        httpGet:
          path: /
          port: http
      readinessProbe:
        httpGet:
          path: /
          port: http
      serviceAccount:
        create: true
        name: search-app-frontend
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      environment:
        - name: API_ENDPOINT
          value: http://search-api.search-app.svc.cluster.local:80

    search-api:
      name: search-api
      replicaCount: 1
      image:
        repository: ccrawford4/search-api
        pullPolicy: IfNotPresent
        tag: "latest"
        port: 8080
      service:
        type: ClusterIP
        port: 80
      livenessProbe:
        httpGet:
          path: /health
          port: http
      readinessProbe:
        httpGet:
          path: /health
          port: http
      serviceAccount:
        create: true
        name: search-api
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      environment:
        - name: MYSQL_USERNAME
          valueFrom:
            secretKeyRef:
              name: search-api-secrets
              key: mysql-username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: search-api-secrets
              key: mysql-password
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: search-api-secrets
              key: redis-host

secrets:
  - name: search-api-secrets
    targetName: search-api-secrets
    secretsKey: mysql-username
    remoteRefKey: mysql-username
  - name: search-api-secrets-password
    targetName: search-api-secrets
    secretsKey: mysql-password
    remoteRefKey: mysql-password
  - name: search-api-secrets-redis
    targetName: search-api-secrets
    secretsKey: redis-host
    remoteRefKey: redis-host
