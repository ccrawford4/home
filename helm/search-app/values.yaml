application-template:
  namespace: search-app
  clusterSecretStoreName: cluster-secret-store
  deployments:
    frontend:
      name: search-app-frontend
      replicaCount: 1
      image:
        repository: ccrawford4/search-app-frontend
        pullPolicy: IfNotPresent
        tag: "latest"
        port: 3000
      service:
        type: ClusterIP
        port: 80
      livenessProbe:
        httpGet:
          path: /
          port: http
      readinessProbe:
        httpGet:
          path: /
          port: http
      serviceAccount:
        create: true
        name: search-app-frontend
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      environment:
        - name: API_ENDPOINT
          value: http://search-api.search-app.svc.cluster.local:80
    search-api:
      name: search-api
      replicaCount: 1
      image:
        repository: ccrawford4/search-api
        pullPolicy: IfNotPresent
        tag: "latest"
        port: 8080
      service:
        type: ClusterIP
        port: 80
      livenessProbe:
        httpGet:
          path: /health
          port: http
      readinessProbe:
        httpGet:
          path: /health
          port: http
      serviceAccount:
        create: true
        name: search-api
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 80
        targetMemoryUtilizationPercentage: 80
      environment:
        - name: MYSQL_HOST
          value: mysql-search-app.mysql.svc.cluster.local
        - name: MYSQL_USERNAME
          valueFrom:
            secretKeyRef:
              name: mysql-search-app-credentials
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-search-app-credentials
              key: password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: mysql-search-app-credentials
              key: database
        - name: REDIS_HOST
          value: redis-search-app.redis.svc.cluster.local
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-search-app-credentials
              key: password
