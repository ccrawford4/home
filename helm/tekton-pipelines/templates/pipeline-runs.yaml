{{- range .Values.pipelineRuns }}
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: {{ .name }}
  namespace: tekton-pipelines
spec:
  pipelineRef:
    name: {{ .pipelineRef }}
{{- if .params }}
  params:
{{- range .params }}
    - name: {{ .name }}
      value: {{ .value }}
{{- end }}
{{- if .podTemplate }}
  taskRunTemplate:
    podTemplate:
      {{- if .podTemplate.securityContext }}
      securityContext:
{{- toYaml .podTemplate.securityContext | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
