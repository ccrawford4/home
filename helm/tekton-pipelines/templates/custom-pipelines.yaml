{{- range .Values.pipelines }}
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: {{ .name }}
  namespace: tekton-pipelines
spec:
{{- if .params }}
  params:
    {{- range .params }}
    - name: {{ .name }}
      {{- with .type }}
      type: {{ . }}
      {{- end }}
    {{- end }}
{{- end }}
  tasks:
    {{- range .tasks }}
    - name: {{ .name }}
      taskRef:
        {{- if kindIs "map" .taskRef }}
{{- toYaml .taskRef | nindent 8 }}
        {{- else }}
        name: {{ .taskRef }}
        {{- end }}
      {{- if .params }}
      params:
        {{- range .params }}
        - name: {{ .name }}
          value: {{ .value }}
        {{- end }}
      {{- end }}
    {{- end }}
{{- end }}
