# Tasks
tasks:
  - name: hello-task
    stepTemplate:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
    steps:
      - name: echo
        image: alpine
        script: |
          #/bin/sh
          echo "Hello!"
  - name: goodbye-task
    stepTemplate:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
    params:
      - name: username
        type: string
    steps:
      - name: echo
        image: alpine
        script: |
          #/bin/sh
          echo "Goodbye, $(params.username)!"
# Pipelines
pipelines:
  - name: hello-pipeline
    params:
      - name: username
        type: string
    tasks:
      - name: hello-task
        taskRef: hello-task
      - name: goodbye-task
        taskRef: goodbye-task
        runAfter:
          - hello-task
        params:
          - name: username
            value: $(params.username)
# PipelineRuns
pipelineRuns:
  - name: hello-pipeline-run
    pipelineRef: hello-pipeline
    params:
      - name: username
        value: "Tekton Test 1"
    podTemplate:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
  - name: hello-goodbye-pipeline-run
    pipelineRef: hello-pipeline
    params:
      - name: username
        value: "Tekton Test 2"
    podTemplate:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault

# Shared namespace for the Tekton resources rendered by this chart.
namespace: tekton-pipelines

# Listeners
listeners:
  - name: home-apps-builder
    serviceAccountName: tekton-triggers-controller
    triggerGroups:
      - name: github-pr-group
        interceptors:
          - name: "validate GitHub payload and filter on eventType"
            ref:
              name: "github"
            params:
              - name: "secretRef"
                value:
                  secretName: github-secret
                  secretKey: secretToken
              - name: "eventTypes"
                value: ["pull_request"]
          - name: "only when PRs are opened"
            ref:
              name: "cel"
            params:
              - name: "filter"
                value: "body.action in ['opened', 'synchronize', 'reopened']"
        triggerSelector:
          labelSelector:
            matchLabels:
              type: github-pr

# ClusterSecretStores
clusterSecretStores:
  - name: cluster-secret-store
    projectID: "home-473419"
    secretName: gcp-sa-secret
    secretKey: secret-access-credentials
    secretNamespace: default

# Secrets
secretsConfig:
  clusterSecretStoreName: cluster-secret-store
  secrets:
    - name: github-secret
      data:
        - secretKey: secretToken
          remoteRefKey: tekton-pipelines-github-token

# Roles
roles:
  - name: tekton-triggers-createwebhook
    rules:
      - apiGroups: [""]
        resources: ["secrets"]
        verbs: ["get", "list", "create", "update", "delete"]
      - apiGroups: ["triggers.tekton.dev"]
        resources: ["eventlisteners"]
        verbs: ["get", "list", "create", "update", "delete"]
      - apiGroups: ["extensions", "networking.k8s.io"]
        resources: ["ingresses"]
        verbs: ["get", "list", "create", "update", "delete"]

# Service Accounts
serviceAccounts:
  - name: tekton-triggers-createwebhook

# Role Bindings
roleBindings:
  - name: tekton-triggers-createwebhook
    subjects:
      - kind: ServiceAccount
        name: tekton-triggers-createwebhook
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: Role
      name: tekton-triggers-createwebhook
