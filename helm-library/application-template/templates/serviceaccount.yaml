{{- range $key, $deployment := .Values.deployments }}
{{- if $deployment.serviceAccount.create -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $deployment.name }}
  labels:
    {{- include "application-template.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $key }}
  {{- with $deployment.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ $.Values.namespace }}
{{- if $deployment.serviceAccount.automount }}
automountServiceAccountToken: {{ $deployment.serviceAccount.automount }}
{{- end }}
{{- end }}
{{- end }}
