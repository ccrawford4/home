{{- if .Values.serviceAccount.create -}}
{{- $serviceAccounts := dict -}}
{{- $_ := set $serviceAccounts (.Values.serviceAccount.name | default .Values.name) true -}}
{{- range .Values.deployments }}
{{- if .serviceAccount }}
{{- $_ := set $serviceAccounts .serviceAccount true -}}
{{- end }}
{{- end }}
{{- range $name := keys $serviceAccounts | sortAlpha }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "application-template.labels" $ | nindent 4 }}
  {{- with $.Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  namespace: {{ $.Values.namespace }}
automountServiceAccountToken: {{ $.Values.serviceAccount.automount | default true }}
{{- end }}
{{- if .Values.serviceAccount.clusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.serviceAccount.clusterRole.name | default .Values.name }}
  {{- with .Values.serviceAccount.clusterRole.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
rules:
  {{- toYaml .Values.serviceAccount.clusterRole.rules | nindent 2 }}
{{- end }}
{{- if .Values.serviceAccount.clusterRoleBinding }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.serviceAccount.clusterRoleBinding.name | default .Values.name }}
  {{- with .Values.serviceAccount.clusterRoleBinding.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name | default .Values.name }}
    namespace: {{ .Values.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.serviceAccount.clusterRoleBinding.roleName | default .Values.serviceAccount.clusterRole.name | default .Values.name }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
