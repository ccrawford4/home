{{- range $key, $deployment := .Values.deployments }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $deployment.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "application-template.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $key }}
spec:
  type: {{ $deployment.service.type }}
  ports:
    - port: {{ $deployment.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "application-template.selectorLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $key }}
{{- end }}
